{% extends 'base.html' %}

{% block title %}Setup - SF TENNIS KIDS Club{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-logo">
    <h1>SF TENNIS KIDS Club</h1>
    <p>Initial Setup - Create Admin Account</p>
  </div>

  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Create Admin Account</h2>
    </div>

    <form method="POST" action="{{ url_for('setup') }}">
      <div class="form-group">
        <label for="full_name">Full Name</label>
        <input type="text" class="form-control" id="full_name" name="full_name" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Create Admin Account</button>
    </form>
  </div>
</div>
{% endblock %}
