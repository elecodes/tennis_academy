<!-- Dashboard Header Component -->
<div class="bg-navy text-white py-16 mb-12 relative overflow-hidden rounded-[3rem] mx-6 mt-6 shadow-2xl">
  <!-- Dynamic Background Patterns -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-24 -right-24 w-96 h-96 border-[16px] border-white/5 rounded-full animate-fade-in"
      style="animation-delay: 0.5s"></div>
    <div class="absolute top-1/2 right-1/4 w-64 h-64 border-8 border-accent/10 rounded-full animate-fade-in"
      style="animation-delay: 0.8s"></div>
    <div class="absolute -bottom-12 -left-12 w-48 h-48 bg-accent/10 rounded-3xl rotate-12 animate-fade-in"
      style="animation-delay: 0.3s"></div>

    <!-- Decorative Mesh-like pattern -->
    <div class="absolute inset-0 opacity-[0.03]"
      style="background-image: radial-gradient(var(--white) 1px, transparent 1px); background-size: 32px 32px;"></div>
  </div>

  <div class="max-w-7xl mx-auto px-10 relative z-10">
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-10">
      <div class="max-w-2xl">
        <div
          class="inline-flex items-center gap-3 px-4 py-1.5 bg-accent rounded-full text-white text-[10px] font-black uppercase tracking-[0.3em] mb-6 animate-slide-up shadow-lg">
          <span class="material-symbols-outlined text-sm">verified_user</span>
          Official Partner of SFSU
        </div>
        <h1 class="text-5xl lg:text-7xl font-black tracking-tight mb-4 font-serif animate-slide-up leading-[1.1]">
          SF TENNIS <span class="italic text-accent decoration-accent decoration-4">KIDS</span> Academy
        </h1>
        <p class="text-xl text-white/60 italic font-medium animate-slide-up border-l-4 border-accent/30 pl-6 py-1"
          style="animation-delay: 0.2s">
          "The Gift of Tennis - A Lifetime Sport!"
        </p>
      </div>

      <div class="flex items-center gap-6 animate-fade-in" style="animation-delay: 0.4s">
        <div
          class="bg-white/5 backdrop-blur-xl border border-white/10 px-8 py-5 rounded-[2rem] shadow-2xl flex items-center gap-5">
          <div
            class="w-14 h-14 bg-navy rounded-2xl flex items-center justify-center text-white text-xl font-black shadow-lg ring-4 ring-white/5">
            {{ session.full_name[:1] }}
          </div>
          <div>
            <span class="text-[10px] font-black text-accent uppercase tracking-widest block mb-1">Active Portal</span>
            <span class="text-lg font-bold text-white">{{ session.full_name }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
