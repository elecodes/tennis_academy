 {% extends "base.html" %} {%
  block title %}Send Message - Tennis Academy{% endblock %} {% block content %} <div class="container mt-4">
  <div class="row mb-4">
    <div class="col-md-8">
      <h1><i class="fas fa-envelope"></i> Send Message</h1>
    </div>
    <div class="col-md-4 text-end">
      <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back
      </a>
    </div>
  </div>

  <div class="card">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">Compose Message</h5>
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label for="message_type" class="form-label">Message Type *</label>
              <select class="form-select" id="message_type" name="message_type" required>
                <option value="">Select type...</option>
                <option value="announcement">Announcement</option>
                <option value="rain_cancellation">Rain Cancellation</option>
                <option value="coach_delay">Coach Delay</option>
                <option value="schedule_change">Schedule Change</option>
              </select>
            </div>
          </div>

          <div class="col-md-6">
            <div class="mb-3">
              <label for="group_id" class="form-label">Select Group</label>
              <select class="form-select" id="group_id" name="group_id">
                <option value="">-- All Groups --</option>
                {% for group in groups %}
                <option value="{{ group.id }}">{{ group.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label for="subject" class="form-label">Subject *</label>
          <input type="text" class="form-control" id="subject" name="subject"
            placeholder="e.g., Session Cancelled Due to Rain" required>
        </div>

        <div class="mb-3">
          <label for="content" class="form-label">Message Content *</label>
          <textarea class="form-control" id="content" name="content" rows="5" placeholder="Write your message here..."
            required></textarea>
        </div>

        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="is_general" name="is_general">
            <label class="form-check-label" for="is_general">
              Send to ALL families (General Announcement)
            </label>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-paper-plane"></i> Send Message
          </button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
            <i class="fas fa-times"></i> Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
  </div>
  {% endblock %}
  EOF

  echo "✅ admin/send_message.html created"
